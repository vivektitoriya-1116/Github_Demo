<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Paperie & Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2; --warm-white: #fff9f0; --ink: #1a1410;
    --bark: #3d2b1f; --terracotta: #c4623a; --sage: #7a9e7e;
    --gold: #c9a84c; --light-gold: #f0e4c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); }

  nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 5vw; background: var(--cream); border-bottom: 1px solid rgba(61,43,31,0.12); }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--bark); text-decoration: none; }
  .logo span { color: var(--terracotta); font-style: italic; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--bark); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--terracotta); }
  .cart-btn { background: var(--ink); color: var(--cream); border: none; cursor: pointer; padding: 0.55rem 1.3rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.2s; }
  .cart-btn:hover { background: var(--terracotta); }

  .page-hero { background: linear-gradient(135deg, var(--warm-white) 0%, var(--light-gold) 100%); padding: 4rem 5vw 3rem; border-bottom: 1px solid rgba(61,43,31,0.08); }
  .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,4vw,3.2rem); color: var(--bark); }
  .page-hero p { color: #888; margin-top: 0.5rem; }

  /* SHOP LAYOUT */
  .shop-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0; min-height: 70vh; }

  /* SIDEBAR */
  .sidebar { padding: 2.5rem 2rem; border-right: 1px solid rgba(61,43,31,0.1); background: var(--warm-white); }
  .filter-section { margin-bottom: 2.5rem; }
  .filter-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--terracotta); font-weight: 500; margin-bottom: 1rem; }
  .filter-list { list-style: none; }
  .filter-list li { margin-bottom: 0.6rem; }
  .filter-list label { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; cursor: pointer; color: var(--bark); transition: color 0.2s; }
  .filter-list label:hover { color: var(--terracotta); }
  .filter-list input[type="checkbox"] { accent-color: var(--terracotta); }
  .filter-tag { margin-left: auto; font-size: 0.7rem; color: #bbb; }
  .price-range { width: 100%; accent-color: var(--terracotta); }
  .price-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #999; margin-top: 0.5rem; }
  .clear-btn { font-size: 0.75rem; color: var(--terracotta); cursor: pointer; background: none; border: none; letter-spacing: 0.05em; text-transform: uppercase; padding: 0; margin-top: 1rem; display: block; }

  /* PRODUCTS AREA */
  .products-area { padding: 2rem 3vw; }
  .products-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(61,43,31,0.08); }
  .results-count { font-size: 0.85rem; color: #888; }
  .sort-select { background: var(--cream); border: 1px solid rgba(61,43,31,0.2); padding: 0.4rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--bark); cursor: pointer; }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
  .search-input { flex: 1; background: white; border: 1px solid rgba(61,43,31,0.15); padding: 0.65rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--ink); }
  .search-input:focus { outline: none; border-color: var(--terracotta); }

  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
  .product-card { background: white; border: 1px solid rgba(61,43,31,0.06); overflow: hidden; transition: all 0.3s; cursor: pointer; animation: fadeUp 0.4s ease both; }
  .product-card:hover { box-shadow: 0 12px 40px rgba(61,43,31,0.12); transform: translateY(-3px); }
  .product-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; position: relative; }
  .product-badge { position: absolute; top: 0.8rem; left: 0.8rem; background: var(--terracotta); color: white; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.6rem; }
  .product-badge.new { background: var(--sage); }
  .product-badge.sale { background: var(--gold); color: var(--bark); }
  .product-info { padding: 1.2rem; }
  .product-category { font-size: 0.68rem; color: var(--terracotta); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; margin-bottom: 0.3rem; }
  .product-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--bark); margin-bottom: 0.4rem; }
  .product-desc { font-size: 0.78rem; color: #999; line-height: 1.5; margin-bottom: 1rem; }
  .product-footer { display: flex; justify-content: space-between; align-items: center; }
  .product-price { font-size: 1rem; font-weight: 500; color: var(--bark); }
  .add-btn { background: var(--ink); color: white; border: none; cursor: pointer; padding: 0.45rem 0.9rem; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: background 0.2s; }
  .add-btn:hover { background: var(--terracotta); }

  .active-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-chip { background: var(--light-gold); color: var(--bark); font-size: 0.72rem; padding: 0.3rem 0.8rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
  .filter-chip span { color: var(--terracotta); font-weight: bold; }

  footer { background: var(--ink); color: var(--cream); padding: 2rem 5vw; display: flex; justify-content: space-between; align-items: center; }
  footer p { font-size: 0.75rem; color: rgba(250,247,242,0.3); }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .footer-logo span { color: var(--terracotta); font-style: italic; }

  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @media(max-width:768px) { .shop-layout { grid-template-columns: 1fr; } .sidebar { display: none; } .nav-links { display: none; } }
</style>
</head>
<body>
<nav>
  <a href="stationery-shop.html" class="logo">Paperie <span>&</span> Co.</a>
  <ul class="nav-links">
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="collections.html">Collections</a></li>
    <li><a href="gifting.html">Gifting</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
  <a href="cart.html"><button class="cart-btn">🛒 Cart (0)</button></a>
</nav>

<div class="page-hero">
  <h1>Shop All</h1>
  <p>192 beautifully curated stationery items</p>
</div>

<div class="shop-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">Category</div>
      <ul class="filter-list">
        <li><label><input type="checkbox" checked> Notebooks <span class="filter-tag">42</span></label></li>
        <li><label><input type="checkbox"> Pens & Pencils <span class="filter-tag">68</span></label></li>
        <li><label><input type="checkbox"> Cards & Letters <span class="filter-tag">35</span></label></li>
        <li><label><input type="checkbox"> Desk Organizers <span class="filter-tag">27</span></label></li>
        <li><label><input type="checkbox"> Gift Sets <span class="filter-tag">19</span></label></li>
      </ul>
    </div>
    <div class="filter-section">
      <div class="filter-title">Price Range</div>
      <input type="range" min="100" max="5000" value="3000" class="price-range" id="priceRange" oninput="document.getElementById('priceVal').textContent='₹'+this.value">
      <div class="price-labels"><span>₹100</span><span id="priceVal">₹3,000</span></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Paper Type</div>
      <ul class="filter-list">
        <li><label><input type="checkbox"> Dot Grid</label></li>
        <li><label><input type="checkbox"> Ruled</label></li>
        <li><label><input type="checkbox"> Blank</label></li>
        <li><label><input type="checkbox"> Mixed</label></li>
      </ul>
    </div>
    <div class="filter-section">
      <div class="filter-title">Availability</div>
      <ul class="filter-list">
        <li><label><input type="checkbox" checked> In Stock</label></li>
        <li><label><input type="checkbox"> Pre-Order</label></li>
      </ul>
    </div>
    <button class="clear-btn">Clear All Filters</button>
  </aside>

  <!-- PRODUCTS -->
  <div class="products-area">
    <div class="search-bar">
      <input type="text" class="search-input" placeholder="Search products..." id="searchInput" oninput="filterProducts()">
    </div>
    <div class="active-filters">
      <div class="filter-chip">Notebooks <span>×</span></div>
      <div class="filter-chip">In Stock <span>×</span></div>
    </div>
    <div class="products-toolbar">
      <span class="results-count" id="countLabel">Showing 8 products</span>
      <select class="sort-select">
        <option>Sort: Featured</option>
        <option>Price: Low to High</option>
        <option>Price: High to Low</option>
        <option>Newest First</option>
      </select>
    </div>
    <div class="products-grid" id="productsGrid">
      <!-- cards injected by JS -->
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">Paperie <span>&</span> Co.</div>
  <p>© 2026 Paperie & Co. All rights reserved.</p>
</footer>

<script>
const products = [
  { icon:'📓', bg:'#f5ede0', cat:'Notebooks', name:'Linen Hardcover Journal', desc:'192 pages, dot grid, lay-flat binding', price:850, badge:'Bestseller', delay:0 },
  { icon:'🖊️', bg:'#e8f0e9', cat:'Pens', name:'Copper-Tip Fineliner Set', desc:'12 archival-ink colours', price:1200, badge:'New', badgeClass:'new', delay:0.05 },
  { icon:'📬', bg:'#f0e8e8', cat:'Cards', name:'Pressed Flower Notecards', desc:'Set of 10 with envelopes', price:650, badge:'', delay:0.1 },
  { icon:'🗂️', bg:'#ede8f5', cat:'Desk', name:'Walnut Pen Tray', desc:'Solid walnut, natural oil finish', price:1499, badge:'Sale', badgeClass:'sale', delay:0.15 },
  { icon:'📝', bg:'#f5f0e0', cat:'Notebooks', name:"Traveler's Refill Set", desc:'3-pack: ruled, blank, weekly', price:450, badge:'', delay:0.2 },
  { icon:'🎀', bg:'#e8ede8', cat:'Gifts', name:"The Writer's Companion", desc:'Journal + pen + ink, gift boxed', price:2800, badge:'Gift', delay:0.25 },
  { icon:'✏️', bg:'#f0eee0', cat:'Pens', name:'Blackwing Pearl Pencils', desc:'Set of 12 premium pencils', price:980, badge:'', delay:0.3 },
  { icon:'🔖', bg:'#e0eef0', cat:'Accessories', name:'Leather Bookmark Set', desc:'Handstitched, set of 3', price:380, badge:'New', badgeClass:'new', delay:0.35 },
];

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = list.map(p => `
    <div class="product-card" style="animation-delay:${p.delay}s">
      <div class="product-img" style="background:${p.bg}">
        ${p.icon}
        ${p.badge ? `<span class="product-badge ${p.badgeClass||''}">${p.badge}</span>` : ''}
      </div>
      <div class="product-info">
        <p class="product-category">${p.cat}</p>
        <h3 class="product-name">${p.name}</h3>
        <p class="product-desc">${p.desc}</p>
        <div class="product-footer">
          <span class="product-price">₹${p.price.toLocaleString('en-IN')}</span>
          <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('countLabel').textContent = `Showing ${list.length} products`;
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  renderProducts(filtered);
}

function addToCart(btn) {
  btn.textContent = '✓ Added!';
  btn.style.background = '#7a9e7e';
  setTimeout(() => { btn.textContent = 'Add to Cart'; btn.style.background = ''; }, 1500);
}

renderProducts(products);
</script>
</body>
</html>
